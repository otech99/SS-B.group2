services:

  # ── Django backend ──────────────────────────────────────────
  django:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: certchain_django
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - certchain_net
    restart: unless-stopped

  # ── Hyperledger Besu (nodo privato) ─────────────────────────
