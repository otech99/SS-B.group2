version: '3.8'

services:

  # ── 1. Nodo Blockchain Locale (Ganache) ─────────────────────
  ganache:
    image: trufflesuite/ganache:latest
    container_name: certchain_ganache
    ports:
      - "8545:8545"
    # Avvia Ganache in modo deterministico sulla porta corretta
    command: ["--host", "0.0.0.0", "--port", "8546", "--networkId", "1337", "--deterministic"]
    networks:
      - certchain_net
    restart: unless-stopped

  # ── 2. Django Backend & Brownie ─────────────────────────────
  django:
    build:
      context: .
      dockerfile: Dockerfile.django # Assicurati che il file si chiami così!
    container_name: certchain_django
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # FONDAMENTALE: Sincronizza il tuo codice locale con il container
    env_file:
      - .env
    environment:
      # Sovrascriviamo l'URL in modo che Brownie/Django puntino al container Ganache
      - BLOCKCHAIN_NODE_URL=http://ganache:8546
    depends_on:
      - ganache # Django si avvia solo DOPO che Ganache è acceso
    networks:
      - certchain_net
    restart: unless-stopped

networks:
  certchain_net:
    driver: bridge