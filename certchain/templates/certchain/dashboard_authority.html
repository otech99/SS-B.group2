{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Ente Certificatore — CertChain</title>
    <link rel="stylesheet" href="{% static 'certchain/css/style.css' %}">
</head>
<body class="dashboard-body">
    <nav class="navbar">
        <img src="{% static 'certchain/img/logo.png' %}" class="nav-logo-img">
        <div class="nav-user"><span>{{ user.username }} (Authority)</span></div>
    </nav>

    <main class="main-content" style="margin-left:0; padding: 40px 10%;">
        <h2 class="section-title">Evidenze in attesa di Verifica</h2>
        <div class="card">
            <table class="verification-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Evidenze Dichiarate</th>
                        <th>Data</th>
                        <th>Azione</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="font-mono">studente_01</td>
                        <td>IDCERT, Fondamenti Info</td>
                        <td>21/03/2026</td>
                        <td><button class="btn-verify">Verifica e Certifica</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
