{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — CertChain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'certchain/css/style.css' %}">
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">
      <span class="logo-mark">◈</span>
      <span class="logo-text">CertChain</span>
    </div>
    <div class="nav-links">
      <span style="font-size:0.85rem; color:var(--text-secondary);">{{ user.username }}</span>
      <a href="{% url 'logout' %}" class="btn-nav">Esci</a>
    </div>
  </nav>

  <section class="section">
    <div class="section-label">Dashboard</div>
    <h1 class="hero-title" style="font-size:2rem;">Benvenuto, {{ user.username }}</h1>
    <p style="color:var(--text-secondary); margin-top:1rem;">
      Questa è la tua dashboard. I contenuti verranno aggiunti nelle prossime sessioni.
    </p>
  </section>

</body>
</html>
