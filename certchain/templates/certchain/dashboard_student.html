{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Studente — CertChain</title>
    <link rel="stylesheet" href="{% static 'certchain/css/style.css' %}">
</head>
<body class="dashboard-body">
    <nav class="navbar">
        <img src="{% static 'certchain/img/logo.png' %}" class="nav-logo-img">
        <div class="nav-user">
            <span>{{ user.username }}</span>
            <a href="{% url 'logout' %}" class="btn-nav">Logout</a>
        </div>
    </nav>

    <aside class="sidebar">
        <a href="#" class="active">Le mie Evidenze</a>
        <a href="#">Certificazioni</a>
    </aside>

    <main class="main-content">
        <div class="card">
            <h2 class="section-title" style="text-align:left;">Dichiara le tue Evidenze</h2>
            <form method="post">
                {% csrf_token %}
                <div class="evidence-list">
                    <label class="toggle-container"><input type="checkbox" name="idcert"> IDCERT Coding</label>
                    <label class="toggle-container"><input type="checkbox" name="musa"> Corso Python Musa</label>
                    <label class="toggle-container"><input type="checkbox" name="fondamenti"> Fondamenti di Informatica</label>
                    <label class="toggle-container"><input type="checkbox" name="ingsw"> Ingegneria del Software</label>
                </div>
                <button type="submit" class="btn-primary" style="margin-top:20px;">Invia per Verifica</button>
            </form>
        </div>

        <div class="card" style="margin-top:30px;">
            <h3>Risultati Inferenza Bayesiana (On-Chain)</h3>
            <div class="prob-row">
                <label>Basi di Programmazione: <strong>{{ prob_basi }}%</strong></label>
                <div class="progress-bar"><div class="progress-fill" style="width: {{ prob_basi }}%"></div></div>
            </div>
            <div class="prob-row">
                <label>Programmazione Python: <strong>{{ prob_py }}%</strong></label>
                <div class="progress-bar"><div class="progress-fill" style="width: {{ prob_py }}%"></div></div>
            </div>
            <div class="status-badge verified">Stato: Verificato</div>
        </div>
    </main>
</body>
</html>
