{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Azienda — CertChain</title>
    <link rel="stylesheet" href="{% static 'certchain/css/style.css' %}">
</head>
<body class="dashboard-body">
    <nav class="navbar">
        <img src="{% static 'certchain/img/logo.png' %}" class="nav-logo-img">
        <div class="nav-user"><span>Area Aziende</span></div>
    </nav>

    <main class="main-content" style="margin-left:0; padding: 40px 10%;">
        <div class="search-section">
            <form method="post" style="display:flex; gap:10px; max-width:600px; margin: 0 auto 40px;">
                {% csrf_token %}
                <input type="text" name="search" placeholder="Cerca studente per username..." class="field input" style="flex:1; margin:0;">
                <button type="submit" class="btn-primary">Cerca</button>
            </form>
        </div>

        <div class="results-container">
            <div class="card cert-card">
                <div class="cert-header">
                    <h3>Studente: <span class="text-teal">mario_rossi</span></h3>
                    <span class="status-badge verified">Certificato</span>
                </div>
                <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
                <div class="prob-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div>
                        <small>Competenza: Basi Prog</small>
                        <p class="font-mono" style="font-size:1.5rem;">89%</p>
                    </div>
                    <div>
                        <small>Competenza: Prog Python</small>
                        <p class="font-mono" style="font-size:1.5rem;">72%</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
