{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accedi — CertChain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'certchain/css/style.css' %}">
</head>
<body>

  <nav class="navbar">
    <a href="{% url 'home' %}" class="nav-logo" style="text-decoration:none;">
       <div class="nav-logo">
        <img src="{% static 'certchain/img/logo.png' %}" class="nav-logo-img">
    </div>
    </a>
  </nav>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="section-label">Accesso al sistema</div>
      <h1 class="login-title">Bentornato</h1>
      <p style="font-size:0.9rem; color:var(--text-secondary); margin-bottom:1.5rem;">
        Inserisci le tue credenziali per accedere.
      </p>

      {% if error %}
      <div class="alert-error">{{ error }}</div>
      {% endif %}

      <form method="post" class="login-form">
        {% csrf_token %}
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username"
                 placeholder="Il tuo username" required autofocus/>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-primary btn-full">Accedi</button>
      </form>

      <p class="login-back">
        <a href="{% url 'home' %}">← Torna alla home</a>
      </p>
    </div>
  </div>

</body>
</html>
